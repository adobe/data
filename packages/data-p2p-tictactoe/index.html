<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>P2P Tic-Tac-Toe</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #23232f;
      --border: #2e2e3e;
      --text: #e8e8f0;
      --muted: #7a7a9a;
      --accent: #6c63ff;
      --accent2: #ff6b8a;
      --x-color: #6c63ff;
      --o-color: #ff6b8a;
      --win-color: #50fa7b;
      --radius: 10px;
      --radius-sm: 6px;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      width: 100%;
      max-width: 480px;
      text-align: center;
      margin-bottom: 2rem;
    }
    header h1 { font-size: 1.1rem; color: var(--muted); letter-spacing: .05em; text-transform: uppercase; }

    #app {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ── Role selection ───────────────────────────────────────── */
    .role-select {
      display: flex; flex-direction: column; gap: 1.25rem;
      align-items: center; text-align: center;
    }
    .role-select h2 { font-size: 1.5rem; }
    .subtitle { color: var(--muted); max-width: 340px; line-height: 1.6; }
    .hint { color: var(--muted); font-size: .85rem; }
    .role-buttons { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }

    /* ── Buttons ──────────────────────────────────────────────── */
    .btn {
      padding: .6rem 1.4rem;
      border: none; border-radius: var(--radius-sm);
      background: var(--accent); color: #fff;
      font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: opacity .15s, transform .1s;
    }
    .btn:hover { opacity: .88; }
    .btn:active { transform: scale(.97); }
    .btn--secondary { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
    .btn--role { min-width: 160px; padding: .9rem 1.6rem; font-size: 1.05rem; }
    .btn--sm { padding: .35rem .9rem; font-size: .85rem; }
    .btn--restart { width: 100%; padding: .75rem; font-size: 1rem; margin-top: .5rem; }
    .btn:disabled { opacity: .3; cursor: default; }

    /* ── Signaling ────────────────────────────────────────────── */
    .signaling { display: flex; flex-direction: column; gap: 1rem; }
    .signaling h2 { font-size: 1.3rem; }
    .step { font-size: .95rem; color: var(--text); }

    .label { display: block; font-size: .8rem; color: var(--muted); margin-bottom: .35rem; }
    .codebox-wrap { display: flex; flex-direction: column; }
    .codebox {
      width: 100%; padding: .6rem .75rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-family: monospace; font-size: .78rem;
      resize: vertical; margin-bottom: .4rem;
    }
    .codebox:focus { outline: 1.5px solid var(--accent); }

    /* ── Banner ───────────────────────────────────────────────── */
    .banner {
      padding: .65rem 1rem; border-radius: var(--radius-sm);
      font-size: .9rem; background: var(--surface2); border: 1px solid var(--border);
    }
    .banner--error { background: #2d1520; border-color: #7a2535; color: #ff8099; }
    .banner--success { background: #1a2d1e; border-color: #2a7a38; color: #50fa7b; }

    /* ── Game ─────────────────────────────────────────────────── */
    .game { display: flex; flex-direction: column; gap: 1rem; align-items: center; }

    .game__header {
      width: 100%; display: flex; align-items: center;
      justify-content: space-between; gap: 1rem;
    }
    .game__badge {
      padding: .3rem .8rem; border-radius: 999px;
      background: var(--surface2); font-size: .85rem; font-weight: 600;
      border: 1px solid var(--border);
    }
    .game__status { color: var(--muted); font-size: .95rem; }
    .game__status--active { color: var(--win-color); font-weight: 600; }

    /* ── Board ────────────────────────────────────────────────── */

    /* Wrapper is persistent across re-renders so the pointermove listener
       and the cursor overlay survive game-state changes. */
    .board-wrap {
      position: relative;
      width: 100%; max-width: 320px;
    }

    .board {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 8px; width: 100%;
    }

    /* ── Presence cursor overlay ─────────────────────────────── */

    /* Sits on top of the board, covers it exactly, never intercepts clicks. */
    .cursors {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    /* A small dot + player label tracking the remote player's pointer. */
    .cursor {
      position: absolute;
      width: 26px; height: 26px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; line-height: 1;
      /* Offset so the dot is centred on the pointer tip */
      transform: translate(-50%, -50%);
      transition: left .05s linear, top .05s linear;
      box-shadow: 0 2px 8px rgba(0,0,0,.45);
      z-index: 10;
    }
    .cursor--x {
      background: var(--x-color);
      color: #fff;
      border: 2px solid rgba(255,255,255,.3);
    }
    .cursor--o {
      background: var(--o-color);
      color: #fff;
      border: 2px solid rgba(255,255,255,.3);
    }

    .cell {
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: clamp(2rem, 10vw, 3.5rem); font-weight: 700;
      color: var(--muted); cursor: default;
      transition: background .12s, border-color .12s, transform .08s;
    }

    .cell--x { color: var(--x-color); }
    .cell--o { color: var(--o-color); }

    .cell--winning {
      background: #1a2f1e; border-color: var(--win-color);
      box-shadow: 0 0 12px rgba(80, 250, 123, .25);
    }

    .cell--playable {
      cursor: pointer; border-color: var(--border);
    }
    .cell--playable:hover {
      background: var(--surface2); border-color: var(--accent);
      transform: scale(1.04);
    }
  </style>
</head>
<body>
  <header>
    <h1>⬡ P2P Tic-Tac-Toe</h1>
  </header>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
