<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>P2P Tic-Tac-Toe</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      gap: 2rem;
    }

    header {
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    header h1 {
      font-size: 1.1rem;
      color: #7a7a9a;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    #app {
      width: 100%;
      max-width: 480px;
      display: flex;
      justify-content: center;
    }

    p2p-app {
      width: 100%;
    }
  </style>
</head>
<body>
  <header>
    <h1>⬡ P2P Tic-Tac-Toe</h1>
  </header>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
